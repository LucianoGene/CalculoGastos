<script type="module">

const firebaseConfig = {

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
window._db = db;
window._col = collection;
window._doc = doc;
window._setDoc = setDoc;
window._getDocs = getDocs;
window._deleteDoc = deleteDoc;
window._query = query;
window._where = where;
window._dbReady = true;
window.dispatchEvent(new Event('dbReady'));

<style>
:root{
  --bg:#0f0f11;--bg2:#16161a;--bg3:#1e1e24;--border:#2a2a35;
  --text:#e8e6e1;--text2:#8b8994;--text3:#55535f;
  --green:#2dcc8f;--green-bg:rgba(45,204,143,0.08);
  --red:#e8504a;--red-bg:rgba(232,80,74,0.08);
  --amber:#f0a500;--blue:#5b8dee;
  --radius:10px;
  --font-display:'DM Serif Display',serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;font-size:14px;display:flex;flex-direction:column}
nav{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);background:var(--bg2)}
.nav-brand{font-family:var(--font-display);font-size:20px;font-weight:400}
.nav-tabs{display:flex;gap:2px}
.nav-tab{padding:6px 14px;border-radius:6px;border:none;background:transparent;color:var(--text2);font-family:var(--font-body);font-size:13px;cursor:pointer;transition:all .15s}
.nav-tab:hover, .nav-tab.active{color:var(--text);background:var(--bg3)}
.sync-status{font-size:11px;padding:4px 10px;border-radius:20px;font-weight:500}
.sync-ok{background:rgba(45,204,143,.1);color:var(--green)}
.sync-sync{background:rgba(91,141,238,.1);color:var(--blue)}
.month-nav{display:flex;align-items:center;gap:12px;padding:16px 24px;border-bottom:1px solid var(--border)}
.month-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center}
.month-label{font-family:var(--font-display);font-size:18px;min-width:160px;text-align:center}
main{padding:20px 24px;max-width:1100px;width:100%;margin:0 auto}
.section{display:none}.section.active{display:block}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:20px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.kpi-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.kpi-value{font-family:var(--font-mono);font-size:20px;font-weight:500}
.kpi-value.green{color:var(--green)}.kpi-value.red{color:var(--red)}.kpi-value.amber{color:var(--amber)}.kpi-value.blue{color:var(--blue)}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.chart-card.full{grid-column:1/-1}
.chart-title{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
.split-grid{display:grid;grid-template-columns:1.4fr 0.6fr;gap:16px;align-items:start}
.form-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.form-title{font-family:var(--font-display);font-size:15px;margin-bottom:16px;display:flex;align-items:center;gap:6px}
.dot{width:6px;height:6px;border-radius:50%}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;align-items:end}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:11px;color:var(--text3);text-transform:uppercase}
.form-input, .form-select{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;padding:8px 10px;width:100%;outline:none}
.btn{padding:8px 16px;border-radius:6px;border:none;font-family:var(--font-body);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap}
.btn-primary{background:var(--green);color:#0a1a12}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-danger{background:transparent;color:var(--text3);padding:4px 8px}
.btn-danger:hover{color:var(--red);background:var(--red-bg)}
.list-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.list-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.list-title{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.list-empty{padding:32px;text-align:center;color:var(--text3)}
.data-table{width:100%;border-collapse:collapse;margin-top:8px}
.data-table th{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:500;padding:8px 10px;text-align:left;border-bottom:1px solid var(--border)}
.data-table td{padding:9px 10px;border-bottom:1px solid rgba(42,42,53,.5);font-size:13px}
.td-actions{text-align:right!important}
.txt-right{text-align:right}
.txt-mono{font-family:var(--font-mono)}

/* Subtítulos específicos para pestañas internas de UVA */
.sub-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
.sub-tab-btn { padding: 8px 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; color: var(--text2); cursor: pointer; font-family: var(--font-body); font-size: 13px; }
.sub-tab-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }
</style>
</head>

<main>

    <div class="list-card">

      <div style="overflow-x: auto; padding: 10px;">
        <table class="data-table">
          <thead>
            <tr>
              <th>Fecha</th>
              <th class="txt-right">Valor de la Cuota</th>
              <th class="txt-right">Valor UVA</th>
              <th class="txt-right">Cuota en UVAs</th>

</main>

<div class="pdf-container" id="pdf-render" style="display:none"></div>

<script>
/* ==========================================================================
   LÓGICA CONTROL DE GASTOS ORIGINAL (SIN ALTERACIONES)
   ========================================================================== */
const catsGasto=["Supermercado","Servicios/Impuestos","Combustible/Auto","Salidas/Comida","Salud/Farmacia","Educación","Seguros","Cuota Crédito","Otros"];
const catsIngreso=["Sueldo Nativa","Honorarios AP","Inversiones","Otros Ingresos"];
let currentType="gasto", currentYear=2026, currentMonth=5;
let txs=[], chartCatInstance=null, chartEvoInstance=null;

const monthNames=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

function fmt(v){return'$ '+v.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})}
function setSync(status,text){const el=document.getElementById('sync-status');el.className='sync-status '+status;el.innerText=text}
function updateMonthLabel(){document.getElementById('month-label').innerText=monthNames[currentMonth]+" "+currentYear}

function populateSelects(){
  const selCat=document.getElementById('sel-cat');selCat.innerHTML='';
  const list=currentType==="gasto"?catsGasto:catsIngreso;
  list.forEach(c=>{const o=document.createElement('option');o.value=c;o.innerText=c;selCat.appendChild(o)});
  
  const selDia=document.getElementById('sel-dia');selDia.innerHTML='';
  const daysInMonth=new Date(currentYear,currentMonth+1,0).getDate();
  const now=new Date(),currentDay=now.getDate();
  for(let i=1;i<=daysInMonth;i++){
    const o=document.createElement('option');o.value=i;o.innerText=i;
    if(i===currentDay&&currentMonth===now.getMonth()&&currentYear===now.getFullYear())o.selected=true;
    selDia.appendChild(o);
  }
}

async function loadData(){
  if(!window._dbReady){setTimeout(loadData,100);return}
  setSync('sync-sync','Cargando...');
  try{
    const mStr=(currentMonth+1).toString().padStart(2,'0'),prefix=`${currentYear}-${mStr}`;
    const q=window._query(window._col(window._db,'transacciones'),window._where('mesKey','==',prefix));
    const snap=await window._getDocs(q);txs=[];
    snap.forEach(doc=>{txs.push({id:doc.id,...doc.data()})});
    txs.sort((a,b)=>b.dia-a.dia||b.timestamp-a.timestamp);
    renderAll();setSync('sync-ok','Conectado');
  }catch(e){console.error(e);setSync('sync-sync','Error de red')}
}

function renderAll(){
  let inc=0,exp=0;txs.forEach(t=>{if(t.tipo==='ingreso')inc+=t.monto;else exp+=t.monto});
  document.getElementById('kpi-ingresos').innerText=fmt(inc);
  document.getElementById('kpi-gastos').innerText=fmt(exp);
  const bal=inc-exp,balEl=document.getElementById('kpi-saldo');
  balEl.innerText=fmt(bal);balEl.className='kpi-value '+(bal>=0?'green':'red');
  renderCharts(inc,exp);renderList();
}

function renderCharts(inc,exp){
  const catTotals={};txs.forEach(t=>{if(t.tipo==='gasto')catTotals[t.categoria]=(catTotals[t.categoria]||0)+t.monto});
  const catLabels=Object.keys(catTotals),catData=Object.values(catTotals);
  if(chartCatInstance)chartCatInstance.destroy();
  const ctxCat=document.getElementById('chart-cat').getContext('2d');
  if(catLabels.length>0){
    chartCatInstance=new Chart(ctxCat,{
      type:'doughnut',data:{labels:catLabels,datasets:[{data:catData,backgroundColor:['#5b8dee','#a78bfa','#2dcc8f','#e8504a','#f0a500','#ff7675','#00cec9'],borderWidth:0}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#8b8994',font:{family:'DM Sans',size:11}}}}}
    });
  }
  const daysInMonth=new Date(currentYear,currentMonth+1,0).getDate(),daysLabels=[],daysData=[];
  let runningBalance=0;const dayMap={};txs.forEach(t=>{dayMap[t.dia]=(dayMap[t.dia]||0)+(t.tipo==='ingreso'?t.monto:-t.monto)});
  for(let i=1;i<=daysInMonth;i++){daysLabels.push(i.toString());runningBalance+=(dayMap[i]||0);daysData.push(runningBalance)}
  if(chartEvoInstance)chartEvoInstance.destroy();
  const ctxEvo=document.getElementById('chart-evo').getContext('2d');
  chartEvoInstance=new Chart(ctxEvo,{
    type:'line',data:{labels:daysLabels,datasets:[{label:'Saldo',data:daysData,borderColor:'#2dcc8f',backgroundColor:'rgba(45,204,143,0.05)',borderWidth:2,fill:true,tension:0.3,pointRadius:0}]},
    options:{responsive:true,maintainAspectRatio:false,scales:{y:{grid:{color:'#2a2a35'},ticks:{color:'#8b8994',font:{size:10}}},x:{grid:{display:false},ticks:{color:'#8b8994',font:{size:10}}}},plugins:{legend:{display:false}}}
  });
}

function renderList(){
  const container=document.getElementById('list-container');container.innerHTML='';
  if(txs.length===0){container.innerHTML='<div class="list-empty">No hay movimientos.</div>';return}
  let h='<table class="data-table"><thead><tr><th>Detalle</th><th>Categoría</th><th class="txt-right">Monto</th><th class="td-actions"></th></tr></thead><tbody>';
  txs.forEach(t=>{
    h+=`<tr>
      <td><div style="font-weight:500">${t.descripcion}</div><div style="font-size:11px;color:var(--text3)">Día ${t.dia}</div></td>
      <td><span style="font-size:12px;color:var(--text2)">${t.categoria}</span></td>
      <td class="txt-right txt-mono ${t.tipo==='ingreso'?'green':'red'}">${t.tipo==='ingreso'?'+':'-'} ${fmt(t.monto).replace('$ ','')}</td>
      <td class="td-actions"><button class="btn btn-danger" onclick="deleteTx('${t.id}')">Borrar</button></td>
    </tr>`;
  });
  h+='</tbody></table>';container.innerHTML=h;
}

async function deleteTx(id){
  if(!confirm('¿Borrar este movimiento?'))return;
  setSync('sync-sync','Eliminando...');
  try{await window._deleteDoc(window._doc(window._db,'transacciones',id));await loadData()}
  catch(e){console.error(e);setSync('sync-ok','Error')}
}

document.getElementById('btn-add').addEventListener('click',async()=>{
  const desc=document.getElementById('inp-desc').value.trim(),monto=parseFloat(document.getElementById('inp-monto').value);
  const cat=document.getElementById('sel-cat').value,dia=parseInt(document.getElementById('sel-dia').value);
  if(!desc||isNaN(monto)||monto<=0)return alert('Datos inválidos');
  setSync('sync-sync','Guardando...');
  const mStr=(currentMonth+1).toString().padStart(2,'0'),prefix=`${currentYear}-${mStr}`;
  const tDoc={descripcion:desc,monto:monto,categoria:cat,dia:dia,tipo:currentType,mesKey:prefix,timestamp:Date.now()};
  try{await window._setDoc(window._doc(window._col(window._db,'transacciones')),tDoc);document.getElementById('inp-desc').value='';document.getElementById('inp-monto').value='';await loadData()}
  catch(e){console.error(e);setSync('sync-ok','Error')}
});

document.getElementById('btn-type-gasto').addEventListener('click',()=>{currentType="gasto";document.getElementById('btn-type-gasto').style.background="var(--bg2)";document.getElementById('btn-type-gasto').style.color="var(--text)";document.getElementById('btn-type-ingreso').style.background="transparent";document.getElementById('btn-type-ingreso').style.color="var(--text2)";populateSelects()});
document.getElementById('btn-type-ingreso').addEventListener('click',()=>{currentType="ingreso";document.getElementById('btn-type-ingreso').style.background="var(--bg2)";document.getElementById('btn-type-ingreso').style.color="var(--text)";document.getElementById('btn-type-gasto').style.background="transparent";document.getElementById('btn-type-gasto').style.color="var(--text2)";populateSelects()});
document.getElementById('btn-prev').addEventListener('click',()=>{currentMonth--;if(currentMonth<0){currentMonth=11;currentYear--}updateMonthLabel();populateSelects();loadData()});
document.getElementById('btn-next').addEventListener('click',()=>{currentMonth++;if(currentMonth>11){currentMonth=0;currentYear++}updateMonthLabel();populateSelects();loadData()});

/* ==========================================================================
   NAVEGACIÓN DE PESTAÑAS PRINCIPALES (NAV ORIGINAL)
   ========================================================================== */
document.querySelectorAll('[data-main-tab]').forEach(tab => {
  tab.addEventListener('click', (e) => {
    document.querySelectorAll('[data-main-tab]').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    
    const targetTab = e.target.getAttribute('data-main-tab');
    
    // Ocultar todas las vistas principales
    document.getElementById('main-sec-resumen').style.display = 'none';
    document.getElementById('main-sec-diario').style.display = 'none';
    document.getElementById('main-sec-uva').style.display = 'none';
    document.getElementById('section-month-nav').style.display = 'none';
    
    // Mostrar la correspondiente sin alterar comportamientos
    if (targetTab === 'gastos-resumen') {
      document.getElementById('main-sec-resumen').style.display = 'block';
      document.getElementById('section-month-nav').style.display = 'flex';
    } else if (targetTab === 'gastos-diario') {
      document.getElementById('main-sec-diario').style.display = 'block';
      document.getElementById('section-month-nav').style.display = 'flex';
    } else if (targetTab === 'creditos-uva') {
      document.getElementById('main-sec-uva').style.display = 'block';
      mostrarTablaUva('casa'); // Abre por defecto el hipotecario
    }
  });
});

/* ==========================================================================
   NUEVA LÓGICA: CRÉDITOS UVA EXACTO COMO EL EXCEL
   ========================================================================== */
const uvaExcelRows = {
  casa: [
    { f: '2017-02-01', c: 4689.08, v: 17.50, u: 267.94, a: 0 },
    { f: '2017-03-01', c: 4738.74, v: 17.68, u: 268.02, a: 49.66 },
    { f: '2017-04-03', c: 4837.94, v: 18.05, u: 268.02, a: 99.20 },
    { f: '2017-05-02', c: 4951.86, v: 18.48, u: 267.95, a: 113.92 },
    { f: '2024-11-01', c: 339922.63, v: 1267.85, u: 268.10, a: 8847.11 },
    { f: '2025-01-31', c: 357644.44, v: 1333.96, u: 268.10, a: 8874.72 },
    { f: '2025-03-01', c: 365993.14, v: 1365.10, u: 268.10, a: 8348.70 },
    { f: '2025-04-01', c: 374277.95, v: 1396.00, u: 268.10, a: 8284.81 },
    { f: '2025-05-05', c: 385956.60, v: 1439.56, u: 268.10, a: 11678.65 }
  ],
  camioneta: [
    { f: '2025-01-31', c: 349471.90, v: 1333.96, u: 261.98, a: 0 },
    { f: '2025-03-01', c: 337180.19, v: 1365.10, u: 247.00, a: -12291.71 },
    { f: '2025-04-01', c: 360353.17, v: 1396.00, u: 258.13, a: 23172.97 },
    { f: '2025-05-05', c: 366359.25, v: 1439.56, u: 254.49, a: 6006.08 },
    { f: '2025-06-02', c: 383860.84, v: 1487.47, u: 258.06, a: 17501.59 }
  ]
};

function mostrarTablaUva(tipo) {
  document.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.remove('active'));
  if(tipo === 'casa') document.getElementById('sub-btn-casa').classList.add('active');
  else document.getElementById('sub-btn-camioneta').classList.add('active');

  document.getElementById('uva-table-title').innerText = tipo === 'casa' ? 'Historial de Pagos - Hipotecario Casa' : 'Historial de Pagos - Personal Camioneta';
  
  const tbody = document.getElementById('uva-tbody');
  tbody.innerHTML = '';
  
  const rows = uvaExcelRows[tipo];
  rows.forEach(r => {
    const tr = document.createElement('tr');
    
    // Formatear la fecha para que quede más legible (DD/MM/AAAA)
    const partesFecha = r.f.split('-');
    const fechaFormateada = `${partesFecha[2]}/${partesFecha[1]}/${partesFecha[0]}`;
    
    // Color para el aumento si es positivo o negativo
    const claseAumento = r.a > 0 ? 'red' : (r.a < 0 ? 'green' : 'var(--text2)');
    const signoAumento = r.a > 0 ? '+' : '';

    tr.innerHTML = `
      <td>${fechaFormateada}</td>
      <td class="txt-right txt-mono">$ ${r.c.toLocaleString('es-AR', {minimumFractionDigits:2})}</td>
      <td class="txt-right txt-mono">$ ${r.v.toLocaleString('es-AR', {minimumFractionDigits:2})}</td>
      <td class="txt-right txt-mono">${r.u.toLocaleString('es-AR', {minimumFractionDigits:2})}</td>
      <td class="txt-right txt-mono" style="color: ${claseAumento}">${signoAumento}${r.a === 0 ? '-' : '$ ' + r.a.toLocaleString('es-AR', {minimumFractionDigits:2})}</td>
    `;
    tbody.appendChild(tr);
  });
}

// Inicialización general
document.addEventListener('DOMContentLoaded', () => {
  const now = new Date(); currentYear = now.getFullYear(); currentMonth = now.getMonth();
  updateMonthLabel(); populateSelects(); loadData();
});
</script>
</body>
</html>
